<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INRL AR — Brand Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body { background:#1C1C1C; color:#F5F5F0; font-family:'Roboto Mono',monospace; }
    .hidden { display:none !important; }
    .overflow-hidden { overflow:hidden !important; }
    .bg-blue-600 { background-color:#00ED0A !important; color:#1C1C1C !important; border-color:#00ED0A !important; }
    .inrl-navbar { background:#111; border-bottom:3px solid #333; }
    .inrl-brand { font-family:'Averia Serif Libre',serif; font-size:1.4rem; font-weight:700; color:#00ED0A !important; text-decoration:none; letter-spacing:.05em; }
    .inrl-card { background:#212121; border:3px solid #333; box-shadow:6px 6px 0 rgba(0,237,10,.15); border-radius:0; }
    .btn-inrl { background:#00ED0A; border:3px solid #1C1C1C; color:#1C1C1C !important; font-family:'Roboto Mono',monospace; font-weight:700; text-transform:uppercase; border-radius:0; letter-spacing:.05em; }
    .btn-inrl:hover, .btn-inrl:focus { background:#00c409; color:#1C1C1C !important; }
    .btn-inrl-outline { background:transparent; border:2px solid #00ED0A; color:#00ED0A !important; font-family:'Roboto Mono',monospace; font-weight:700; text-transform:uppercase; border-radius:0; }
    .btn-inrl-outline:hover, .btn-inrl-outline:focus { background:#00ED0A; color:#1C1C1C !important; }
    .btn-danger-inrl { background:#ff4d4f; border:2px solid #ff4d4f; color:#fff !important; font-family:'Roboto Mono',monospace; font-weight:700; text-transform:uppercase; border-radius:0; }
    .btn-danger-inrl:hover { background:#d9363e; border-color:#d9363e; color:#fff !important; }
    .form-control, .form-select { background:#1C1C1C !important; border:2px solid #444 !important; color:#F5F5F0 !important; font-family:'Roboto Mono',monospace; border-radius:0; }
    .form-control:focus { background:#1C1C1C !important; border-color:#00ED0A !important; color:#F5F5F0 !important; box-shadow:0 0 0 2px rgba(0,237,10,.2) !important; }
    .form-control::placeholder { color:#555; }
    .inrl-table th { background:#111 !important; border-bottom:3px solid #333 !important; color:#888 !important; font-family:'Roboto Mono',monospace; text-transform:uppercase; font-size:.75rem; letter-spacing:.08em; }
    .inrl-table td { border-bottom:1px solid #2a2a2a !important; vertical-align:middle; color:#F5F5F0; }
    .inrl-table tr:hover td { background:rgba(0,237,10,.04) !important; }
    #status { min-height:1.2em; font-size:.875rem; color:#00ED0A; }
    .inrl-heading { font-family:'Averia Serif Libre',serif; color:#00ED0A; font-size:1.5rem; font-weight:700; border-left:4px solid #00ED0A; padding-left:.75rem; margin-bottom:1.25rem; }
    .step-badge { display:inline-flex; align-items:center; justify-content:center; width:1.5rem; height:1.5rem; background:#00ED0A; color:#1C1C1C; font-weight:700; font-size:.75rem; flex-shrink:0; }
    .target-thumb { width:72px; height:72px; object-fit:contain; border:1px solid #333; background:#111; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:#111; }
    ::-webkit-scrollbar-thumb { background:#333; }
  </style>
  <script src="assets/js/auth-worker.js?v=20260205"></script>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg inrl-navbar px-3 py-2">
  <a class="inrl-brand me-4" href="brand.html">INRL_AR</a>
  <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapseBrand" aria-controls="navCollapseBrand" aria-expanded="false">
    <span style="color:#00ED0A;font-size:1.25rem;">☰</span>
  </button>
  <div class="collapse navbar-collapse" id="navCollapseBrand">
    <div class="d-flex flex-wrap gap-2 me-auto py-2 py-lg-0">
      <button id="uploadTab" class="btn btn-sm btn-inrl-outline bg-blue-600">Upload Target</button>
      <button id="listTab" class="btn btn-sm btn-inrl-outline">Existing Targets</button>
    </div>
    <div class="d-flex flex-wrap align-items-center gap-2 py-2 py-lg-0">
      <a href="/ecommerce/index.html" class="btn btn-sm btn-inrl-outline">Store</a>
      <a href="/ecommerce/dashboard.html" class="btn btn-sm btn-inrl-outline">Product Dashboard</a>
      <a href="/ecommerce/profile.html" class="btn btn-sm btn-inrl-outline">Profile</a>
      <span id="userEmail" class="text-secondary small px-2"></span>
      <button id="logoutBtn" class="btn btn-sm btn-danger-inrl">Logout</button>
    </div>
  </div>
</nav>

<!-- Status bar -->
<div class="container-fluid px-4 pt-3 pb-1">
  <p id="status" class="mb-0"></p>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="container-fluid px-4 pb-5" style="max-width:1200px;">

  <!-- UPLOAD SECTION -->
  <section id="uploadSection">
    <h2 class="inrl-heading mt-4">Upload a New AR Target</h2>

    <div class="inrl-card p-4 mb-4">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label text-secondary small text-uppercase mb-1">Target Name</label>
          <input id="name" type="text" class="form-control" placeholder="Target name" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label text-secondary small text-uppercase mb-1">Product <span class="text-secondary">(optional)</span></label>
          <input id="productInput" type="text" class="form-control" placeholder="Product identifier (e.g. SKU or slug)" />
        </div>
      </div>

      <div class="mt-3">
        <label class="form-label text-secondary small text-uppercase mb-1">Marker Image (.jpg / .png)</label>
        <input id="markerFile" type="file" accept=".jpg,.jpeg,.png" class="form-control mb-2" />
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <button id="serverCompile" class="btn btn-sm btn-inrl">Compile in Browser</button>
          <span id="compileStatus" class="text-secondary small"></span>
        </div>
        <p class="text-secondary small mt-2 mb-0">Tip: large images will be resized to 1024px max to speed up compilation.</p>
      </div>

      <div class="mt-3">
        <label class="form-label text-secondary small text-uppercase mb-1">Video file (.mp4)</label>
        <input id="videoFile" type="file" accept="video/mp4" class="form-control mb-3" />
        <button id="upload" class="btn btn-inrl">Upload Target</button>
      </div>
    </div>
  </section>

  <!-- LIST SECTION -->
  <section id="listSection" class="hidden">
    <h2 class="inrl-heading mt-4">Your Targets</h2>
    <div class="inrl-card p-0">
      <div id="targetsList" class="table-responsive">
        <table class="table table-dark mb-0 inrl-table" style="border-collapse:collapse;">
          <thead>
            <tr>
              <th class="p-3">Target Image</th>
              <th class="p-3">Name</th>
              <th class="p-3">Product</th>
              <th class="p-3">Created</th>
              <th class="p-3">Active</th>
              <th class="p-3 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="targetsTable"></tbody>
        </table>
      </div>
    </div>
  </section>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Worker-based Brand Dashboard -->
    <script>
      async function uploadToWorker(file, path = 'uploads', filename) {
        const uploadUrl = '/upload';
        const form = new FormData();
        form.append('file', file, filename || (file.name || `${Date.now()}`));
        form.append('path', path);
        form.append('filename', filename || (file.name || `${Date.now()}`));
        const res = await fetch(uploadUrl, { method: 'POST', body: form, credentials: 'include' });
        if (!res.ok) {
          const txt = await res.text().catch(() => '');
          throw new Error('Upload failed: ' + res.status + ' ' + txt);
        }
        const j = await res.json().catch(() => ({}));
        if (j.error) throw new Error(j.error || 'Upload returned error');
        return j; // { ok, key, url }
      }

      // small helper functions copied/adapted from admin.html
      async function resizeImage(file, maxDim = 1024) {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        await img.decode();
        let { width, height } = img;
        if (width <= maxDim && height <= maxDim) return file;
        const aspect = width / height;
        if (width > height) { width = maxDim; height = Math.round(maxDim / aspect); }
        else { height = maxDim; width = Math.round(maxDim * aspect); }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        return await new Promise((resolve) => canvas.toBlob((blob) => {
          resolve(new File([blob], file.name, { type: 'image/jpeg' }));
        }, 'image/jpeg', 0.9));
      }

      // compile using mind-ar compiler in the browser (dynamic import)
      async function compileImageClient(markerFile, progressCallback) {
        // dynamic import of tfjs + Compiler
        async function loadScript(url) {
          return new Promise((resolve, reject) => {
            const s = document.createElement('script'); s.src = url; s.onload = () => resolve(); s.onerror = () => reject(new Error('Failed to load ' + url)); document.head.appendChild(s);
          });
        }
        // try a few tfjs versions
        const versions = ['4.16.0','4.8.0','4.20.0'];
        for (const v of versions) {
          try { await loadScript(`https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@${v}/dist/tf.min.js`); if (typeof tf !== 'undefined') break; } catch (e) {}
        }
        const mod = await import('https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js');
        const Compiler = mod.Compiler;
        const fileToUse = await resizeImage(markerFile, 1024);
        const img = new Image(); img.src = URL.createObjectURL(fileToUse); await img.decode();
        const compiler = new Compiler();
        await compiler.compileImageTargets([img], progressCallback);
        const buffer = compiler.exportData ? compiler.exportData() : null;
        if (!buffer) throw new Error('Failed to export compiled data');
        return buffer;
      }

      // UI elements
      const uploadBtn = document.getElementById('upload');
      const statusEl = document.getElementById('status');
      const logoutBtn = document.getElementById('logoutBtn');
      const userEmailEl = document.getElementById('userEmail');
      const uploadSection = document.getElementById('uploadSection');
      const listSection = document.getElementById('listSection');
      const uploadTab = document.getElementById('uploadTab');
      const listTab = document.getElementById('listTab');
      const targetsTable = document.getElementById('targetsTable');

      uploadTab.addEventListener('click', () => { uploadSection.classList.remove('hidden'); listSection.classList.add('hidden'); uploadTab.classList.add('bg-blue-600'); listTab.classList.remove('bg-blue-600'); });
      listTab.addEventListener('click', () => { listSection.classList.remove('hidden'); uploadSection.classList.add('hidden'); listTab.classList.add('bg-blue-600'); uploadTab.classList.remove('bg-blue-600'); loadTargets(); });

      // determine current user + their brand (if any)
      let currentUser = null;
      let currentUserBrand = null;

      async function initBrandContext() {
        if (!window.auth) { window.location.href = '/login.html'; return; }
        const me = await auth.me();
        if (!me) { window.location.href = '/login.html'; return; }
        if (me.role === 'admin') { window.location.href = '/admin.html'; return; }
        if (me.role !== 'brand') { window.location.href = '/ecommerce/'; return; }
        currentUser = me;
        currentUserBrand = me?.brands?.[0]?.name || null;
        if (userEmailEl) userEmailEl.textContent = me?.email || '';
      }

      // upload flow: similar to admin but always tags brand if currentUserBrand is set
      document.getElementById('serverCompile').addEventListener('click', async () => {
        const markerFile = document.getElementById('markerFile').files[0];
        if (!markerFile) { document.getElementById('compileStatus').textContent = '⚠️ Please select an image first.'; return; }
        try {
          statusEl.textContent = 'Compiling marker image in the browser...';
          const buffer = await compileImageClient(markerFile, (p) => { document.getElementById('compileStatus').textContent = `Progress: ${p.toFixed(1)}%`; });
          document.getElementById('compileStatus').textContent = 'Uploading compiled .mind to storage (via Worker)...';
          const filename = markerFile.name.replace(/\.[^/.]+$/, '') + '.mind';
          const fileForUpload = new File([buffer], filename, { type: 'application/octet-stream' });
          const mindUpload = await uploadToWorker(fileForUpload, 'minds', filename);
          const mindUrl = mindUpload.url;
          // stash on window for the upload flow
          window.uploadedMindUrl = mindUrl;
          document.getElementById('compileStatus').textContent = '✅ Compiled and uploaded to storage! Ready to Upload.';
          statusEl.textContent = '';
        } catch (err) { console.error(err); document.getElementById('compileStatus').textContent = `❌ Compile failed: ${err.message || err}`; }
      });

      uploadBtn.addEventListener('click', async () => {
        const name = document.getElementById('name').value.trim();
        const video = document.getElementById('videoFile').files[0];
        const markerImage = document.getElementById('markerFile').files[0];
        if (!name || (!window.uploadedMindUrl && !markerImage) || !video) { alert('⚠️ Please fill all fields and upload required files.'); return; }
        statusEl.textContent = 'Uploading files...';
        const timestamp = Date.now();
        const videoPath = `videos/${timestamp}-${video.name}`;

        if (!window.uploadedMindUrl && markerImage) {
          try {
            statusEl.textContent = 'Compiling marker image in the browser...';
            const buffer = await compileImageClient(markerImage, (p) => { document.getElementById('compileStatus').textContent = `Progress: ${p.toFixed(1)}%`; });
            document.getElementById('compileStatus').textContent = 'Uploading compiled .mind to storage (via Worker)...';
            const filename = markerImage.name.replace(/\.[^/.]+$/, '') + '.mind';
            const fileForUpload = new File([buffer], filename, { type: 'application/octet-stream' });
            const mindUpload = await uploadToWorker(fileForUpload, 'minds', filename);
            const mindUrlLocal = mindUpload.url;
            // upload video
            const videoUpload = await uploadToWorker(video, 'videos', video.name);
            const videoUrlLocal = videoUpload.url;
            // upload original image marker
            let imageUrlLocal = null;
            try {
              const markerUpload = await uploadToWorker(markerImage, 'markers', markerImage.name);
              imageUrlLocal = markerUpload.url;
            } catch (e) { console.warn('Image upload threw', e); }

            const insertObj = { name, mindurl: mindUrlLocal, videourl: videoUrlLocal, is_active: false };
            if (currentUserBrand) insertObj.brand = currentUserBrand;
            const prodVal = (document.getElementById('productInput')?.value || '').trim(); if (prodVal) insertObj.product = prodVal;
            if (imageUrlLocal) insertObj.imageurl = imageUrlLocal;
            await apiFetch('/targets', { method: 'POST', body: insertObj });
            statusEl.textContent = '✅ Upload complete (client-side compile)!';
            document.getElementById('name').value = ''; document.getElementById('videoFile').value = ''; document.getElementById('markerFile').value = ''; document.getElementById('compileStatus').textContent = ''; window.uploadedMindUrl = null; loadTargets(); return;
          } catch (err) { console.error(err); statusEl.textContent = '❌ Client compile/upload failed: ' + (err.message || JSON.stringify(err)); return; }
        }

        // .mind upload (when compiled earlier)
        if (window.uploadedMindUrl) {
          const videoUpload = await uploadToWorker(video, 'videos', video.name);
          const videoUrl = videoUpload.url;
          let imageUrlNew = null;
          if (markerImage) {
            try {
              const markerUpload = await uploadToWorker(markerImage, 'markers', markerImage.name);
              imageUrlNew = markerUpload.url;
            } catch (e) { console.warn('Marker upload threw', e); }
          }
          const insertObj = { name, mindurl: window.uploadedMindUrl, videourl: videoUrl, is_active: false };
          if (currentUserBrand) insertObj.brand = currentUserBrand;
          const prodValNew = (document.getElementById('productInput')?.value || '').trim(); if (prodValNew) insertObj.product = prodValNew;
          if (imageUrlNew) insertObj.imageurl = imageUrlNew;
          await apiFetch('/targets', { method: 'POST', body: insertObj });
          statusEl.textContent = '✅ Upload complete!'; document.getElementById('name').value = ''; document.getElementById('videoFile').value = ''; window.uploadedMindUrl = null; loadTargets(); return;
        }
      });

      async function loadTargets() {
        const res = await apiFetch('/targets');
        const rows = Array.isArray(res?.items) ? res.items : [];
        targetsTable.innerHTML = '';
        const placeholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22currentColor%22%3E%3Cpath d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22/%3E%3C/svg%3E';
        rows.forEach((t) => {
          const isActive = t.is_active ? '✅' : '❌';
          const candidates = [];
          if (t.imageurl) candidates.push(t.imageurl);
          if (t.mindurl) {
            try { candidates.push(t.mindurl.replace(/\.mind$/, '.jpg')); candidates.push(t.mindurl.replace(/\.mind$/, '.png')); } catch (e) {}
          }
          const uniq = Array.from(new Set(candidates.filter(Boolean)));
          const candidateJson = encodeURIComponent(JSON.stringify(uniq));
          const initialSrc = uniq.length ? uniq[0] : placeholder;
          const onerrorAttr = uniq.length ? 'onerror="tryNextImage(this)"' : '';
          const mindArg = encodeURIComponent(t.mindurl || '');
          const videoArg = encodeURIComponent(t.videourl || '');
          const imageArg = encodeURIComponent(t.imageurl || '');
          const brandArg = encodeURIComponent(t.brand || '');
          const productArg = encodeURIComponent(t.product || '');
          const row = `
            <tr>
              <td class="p-3"><img src="${initialSrc}" data-candidates="${candidateJson}" data-idx="0" alt="${t.name}" class="target-thumb" ${onerrorAttr} /></td>
              <td class="p-3">${t.name}</td>
              <td class="p-3">${t.product || ''}</td>
              <td class="p-3 text-secondary">${new Date(t.created_at).toLocaleString()}</td>
              <td class="p-3">${isActive}</td>
              <td class="p-3 text-center" style="white-space:nowrap;">
                <button onclick="setActive('${t.id}')" class="btn btn-sm btn-inrl me-1">Set Active</button>
                <button onclick="deleteTarget('${t.id}', '${t.name}', decodeURIComponent('${mindArg}'), decodeURIComponent('${videoArg}'), decodeURIComponent('${imageArg}'))" class="btn btn-sm btn-danger-inrl me-1">Delete</button>
                <button onclick="copyViewer('${brandArg}','${productArg}')" class="btn btn-sm btn-inrl-outline">Copy Link</button>
              </td>
            </tr>`;
          targetsTable.innerHTML += row;
        });
      }

      // reuse tryNextImage helper
      function tryNextImage(img) {
        const placeholder = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22currentColor%22%3E%3Cpath d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22/%3E%3C/svg%3E';
        try {
          const raw = img.getAttribute('data-candidates'); if (!raw) { img.onerror = null; img.src = placeholder; return; }
          const candidates = JSON.parse(decodeURIComponent(raw)); let idx = parseInt(img.getAttribute('data-idx') || '0', 10); idx = (idx || 0) + 1;
          if (idx >= candidates.length) { img.onerror = null; img.src = placeholder; img.setAttribute('data-idx', idx); }
          else { img.setAttribute('data-idx', idx); img.src = candidates[idx]; }
        } catch (e) { img.onerror = null; img.src = placeholder; }
      }

      // set active via RPC with fallback (same as admin)
      window.setActive = async (targetId) => {
        statusEl.textContent = '⏳ Updating active target...';
        try {
          await apiFetch(`/targets/${encodeURIComponent(targetId)}/activate`, { method: 'POST' });
          statusEl.textContent = '✅ Active target updated!';
        } catch (e) { console.error('Failed to set active target:', e); statusEl.textContent = '❌ Error: ' + (e.message || String(e)); }
        loadTargets();
      };

      // copy viewer link
      window.copyViewer = async (encodedBrand, encodedProduct) => {
        try {
          const brand = decodeURIComponent(encodedBrand || '');
          const product = decodeURIComponent(encodedProduct || '');
          const url = new URL(window.location.href);
          const base = url.origin + url.pathname.replace(/\/brand\.html$/, '/');
          const qs = [];
          if (brand) qs.push(`brand=${encodeURIComponent(brand)}`);
          if (product) qs.push(`product=${encodeURIComponent(product)}`);
          const viewerUrl = `${base}index.html${qs.length ? '?' + qs.join('&') : ''}`;
          await navigator.clipboard.writeText(viewerUrl);
          statusEl.textContent = `✅ Viewer URL copied`;
          setTimeout(() => { if (statusEl && statusEl.textContent) statusEl.textContent = ''; }, 4000);
        } catch (e) { console.error('Failed to copy viewer URL', e); statusEl.textContent = '❌ Failed to copy viewer URL'; }
      };

      window.deleteTarget = async (id, name, mindUrl, videoUrl, imageUrl) => {
        if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
        const confirm2 = prompt('Type "delete" to confirm this action:'); if (confirm2?.toLowerCase() !== 'delete') return alert('❌ Deletion cancelled.');
        statusEl.textContent = 'Deleting target...';
        await apiFetch(`/targets/${encodeURIComponent(id)}`, { method: 'DELETE' });
        statusEl.textContent = '✅ Target deleted!';
        loadTargets();
      };

      logoutBtn?.addEventListener('click', async () => {
        try {
          if (!confirm('Sign out now?')) return;
          await auth.logout();
        } finally {
          window.location.href = '/login.html?loggedout=1';
        }
      });

      // Init
      (async () => {
        await initBrandContext();
        await loadTargets();
      })();
    </script>
  </body>
</html>

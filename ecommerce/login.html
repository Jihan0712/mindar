<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | MindAR Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="css/vendor.css">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Marcellus&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-light text-uppercase fs-6 p-3 border-bottom align-items-center">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="images/main-logo.png" alt="logo" style="height:36px"></a>
      <div class="ms-auto">
        <a href="shop.html" class="text-uppercase mx-3">Shop</a>
        <a href="cart.html" class="text-uppercase mx-3">Cart (<span class="js-cart-count">0</span>)</a>
        <a href="checkout.html" class="text-uppercase mx-3">Checkout</a>
        <a href="profile.html" class="text-uppercase mx-3">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width:480px">
    <h2 class="text-uppercase mb-4">Sign In</h2>
    <div id="status" class="mb-3"></div>
    <form id="login-form" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
        <div class="invalid-feedback">Password required.</div>
      </div>
      <button class="btn btn-dark w-100" type="submit">Login</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const statusEl = document.getElementById('status');
    statusEl.innerHTML = '<div class="alert alert-warning">Login has moved. Redirecting to the main login…</div>';
    setTimeout(() => { window.location.href = '/login.html'; }, 800);
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>

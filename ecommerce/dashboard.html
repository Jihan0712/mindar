<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | MindAR Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="css/vendor.css">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-light text-uppercase fs-6 p-3 border-bottom align-items-center">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="images/main-logo.png" alt="logo" style="height:36px"></a>
      <div class="ms-auto">
        <a href="index.html" class="text-uppercase mx-3">Shop</a>
        <a href="checkout.html" class="text-uppercase mx-3">Checkout</a>
        <a href="#" id="logout" class="text-uppercase mx-3">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="text-uppercase mb-4">My Dashboard</h2>
    <p id="userEmail" class="text-muted mb-4"></p>

    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <div class="card">
          <div class="card-header">Recent Orders</div>
          <div class="card-body">
            <ul id="ordersList" class="list-group"></ul>
            <div id="ordersEmpty" class="text-muted">No orders yet.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function(){
      await Auth.requireLogin();
      const u = await Auth.currentUser();
      document.getElementById('userEmail').textContent = u?.email ? `Signed in as ${u.email}` : '';
      document.getElementById('logout').addEventListener('click', async (e) => { e.preventDefault(); await Auth.signOut(); window.location.href = 'login.html'; });

      const ORDERS_KEY = 'mindar_orders_v1';
      const orders = JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]');
      const list = document.getElementById('ordersList');
      const empty = document.getElementById('ordersEmpty');
      if (orders.length){
        empty.style.display = 'none';
        list.innerHTML = orders.map(o => `
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <div>
              <div class="fw-semibold">Order ${o.order_id}</div>
              <div class="text-muted small">${new Date(o.ts).toLocaleString()}</div>
            </div>
            <div class="text-end">
              <div class="fw-semibold">$${(Math.round(o.total*100)/100).toFixed(2)}</div>
              <div class="small text-muted">${o.items} item(s)</div>
            </div>
          </li>
        `).join('');
      }
    })();
  </script>
</body>
</html>

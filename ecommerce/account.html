  <section class="py-5" style="margin-top:76px">
    <div class="container" style="max-width:600px">
      <h1 class="text-uppercase mb-4">Account</h1>
      <div id="status" class="mb-3" style="font-size:14px">Checking authentication�</div>
      <div id="signedIn" style="display:none">
        <div style="border:3px solid #1C1C1C;padding:24px;box-shadow:4px 4px 0 #1C1C1C;margin-bottom:24px">
          <p class="mb-2"><strong>Email:</strong> <span id="userEmail"></span></p>
          <p class="mb-3"><strong>Role:</strong> <span id="userRole"></span></p>
          <button id="logoutBtn" class="btn btn-outline-dark text-uppercase">Logout</button>
        </div>
      </div>
      <div id="signedOut" style="display:none">
        <p>You are not signed in.</p>
        <a href="login.html" class="btn btn-primary text-uppercase">Login</a>
      </div>
    </div>
  </section>

  <footer id="footer">
    <div class="container">
      <div class="row py-5">
        <div class="col-md-3 col-sm-6 mb-4"><div style="margin-bottom:16px"><img src="images/main-logo.png" alt="INRL" style="height:36px"></div><p>Next-gen digital identity and fashion.</p></div>

      </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
  <script>
  (async function(){
    var statusEl=document.getElementById('status');var signedIn=document.getElementById('signedIn');var signedOut=document.getElementById('signedOut');
    var emailEl=document.getElementById('userEmail');var roleEl=document.getElementById('userRole');var logoutBtn=document.getElementById('logoutBtn');
    try{
      var me=await auth.me();var user=me&&me.email?me:null;
      if(!user){statusEl.textContent='';signedOut.style.display='';return}
      statusEl.textContent='';signedIn.style.display='';
      emailEl.textContent=user.email;roleEl.textContent=user.role||'user';
      logoutBtn.addEventListener('click',async function(){await auth.logout();location.reload()});
    }catch(e){statusEl.textContent='';signedOut.style.display=''}
  })();
  </script>

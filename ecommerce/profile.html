<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile | MindAR Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="css/vendor.css">
  <link rel="stylesheet" type="text/css" href="style.css">

  <!-- Worker Auth Client (shared session + role) -->
  <script src="/assets/js/auth-worker.js?v=20260220"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-light text-uppercase fs-6 p-3 border-bottom align-items-center">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="images/main-logo.png" alt="logo" style="height:36px"></a>
      <div class="ms-auto">
        <a href="shop.html" class="text-uppercase mx-3">Shop</a>
        <a href="cart.html" class="text-uppercase mx-3">Cart (<span class="js-cart-count">0</span>)</a>
        <a href="checkout.html" class="text-uppercase mx-3">Checkout</a>
        <a href="profile.html" class="text-uppercase mx-3">Profile</a>
        <a id="navDashboard" href="dashboard.html" class="text-uppercase mx-3" style="display:none">Dashboard</a>
        <a id="navLogin" href="/login.html" class="text-uppercase mx-3">Login</a>
        <a id="navLogout" href="#" class="text-uppercase mx-3" style="display:none">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width: 860px">
    <h1 class="text-uppercase mb-3">Profile</h1>

    <div id="status" class="alert alert-light border" role="status">Loading…</div>

    <div id="signedIn" style="display:none">
      <div class="card mb-4">
        <div class="card-body">
          <div class="text-muted" style="font-size: 14px">Signed in as</div>
          <div class="fw-semibold" id="userEmail">—</div>
          <div class="text-muted" style="font-size: 14px">Role: <span id="userRole">—</span></div>

          <div class="d-flex flex-wrap gap-2 mt-4">
            <a class="btn btn-outline-dark text-uppercase" href="shop.html">Shop</a>
            <a class="btn btn-outline-dark text-uppercase" href="cart.html">Cart</a>
            <a class="btn btn-outline-dark text-uppercase" href="checkout.html">Checkout</a>
            <a id="arDashboardBtn" class="btn btn-outline-dark text-uppercase" href="/admin.html" style="display:none">AR Dashboard</a>
            <button id="logoutBtn" class="btn btn-dark text-uppercase">Logout</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header text-uppercase">Change password</div>
        <div class="card-body">
          <div id="pwStatus" class="alert alert-light border" role="status" style="display:none"></div>

          <form id="pwForm" class="vstack gap-3">
            <div>
              <label class="form-label text-uppercase" for="currentPassword">Current password</label>
              <input id="currentPassword" class="form-control" type="password" autocomplete="current-password" required>
            </div>

            <div>
              <label class="form-label text-uppercase" for="newPassword">New password</label>
              <input id="newPassword" class="form-control" type="password" autocomplete="new-password" minlength="8" required>
              <div class="form-text">Minimum 8 characters.</div>
            </div>

            <div>
              <label class="form-label text-uppercase" for="confirmPassword">Confirm new password</label>
              <input id="confirmPassword" class="form-control" type="password" autocomplete="new-password" minlength="8" required>
            </div>

            <div class="d-flex justify-content-end">
              <button id="submitBtn" class="btn btn-dark text-uppercase" type="submit">Update password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="js/cart.js"></script>
  <script>
    function showPwStatus(message, kind) {
      const el = document.getElementById('pwStatus');
      if (!el) return;
      if (!message) {
        el.style.display = 'none';
        el.textContent = '';
        el.className = 'alert alert-light border';
        return;
      }
      el.style.display = '';
      el.textContent = message;
      el.className = 'alert border ' + (kind === 'error' ? 'alert-danger' : kind === 'success' ? 'alert-success' : 'alert-light');
    }

    function setBusy(busy) {
      const btn = document.getElementById('submitBtn');
      if (!btn) return;
      btn.disabled = !!busy;
    }

    (async function(){
      try { CartUI.render(); } catch {}

      const statusEl = document.getElementById('status');
      const signedInEl = document.getElementById('signedIn');
      const emailEl = document.getElementById('userEmail');
      const roleEl = document.getElementById('userRole');
      const dashEl = document.getElementById('navDashboard');
      const loginEl = document.getElementById('navLogin');
      const logoutEl = document.getElementById('navLogout');
      const arDashBtn = document.getElementById('arDashboardBtn');
      const logoutBtn = document.getElementById('logoutBtn');

      const me = await auth.me();
      const user = me && me.email ? me : null;

      if (!user) {
        const next = '/ecommerce/profile.html';
        location.href = `/login.html?next=${encodeURIComponent(next)}`;
        return;
      }

      if (loginEl) loginEl.style.display = 'none';
      if (logoutEl) logoutEl.style.display = '';
      if (logoutEl) logoutEl.addEventListener('click', async (e) => {
        e.preventDefault();
        await auth.logout();
        location.reload();
      });

      const canDashboard = user.role === 'admin' || user.role === 'brand';
      if (dashEl) dashEl.style.display = canDashboard ? '' : 'none';
      if (arDashBtn) arDashBtn.style.display = canDashboard ? '' : 'none';

      if (statusEl) statusEl.style.display = 'none';
      if (signedInEl) signedInEl.style.display = '';
      if (emailEl) emailEl.textContent = user.email || '—';
      if (roleEl) roleEl.textContent = user.role || '—';

      logoutBtn?.addEventListener('click', async () => {
        await auth.logout();
        location.reload();
      });

      const form = document.getElementById('pwForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showPwStatus('', 'info');

        const currentPassword = document.getElementById('currentPassword').value || '';
        const newPassword = document.getElementById('newPassword').value || '';
        const confirmPassword = document.getElementById('confirmPassword').value || '';

        if (!currentPassword || !newPassword || !confirmPassword) {
          showPwStatus('Please fill out all fields.', 'error');
          return;
        }
        if (newPassword.length < 8) {
          showPwStatus('New password must be at least 8 characters.', 'error');
          return;
        }
        if (newPassword !== confirmPassword) {
          showPwStatus('New password and confirmation do not match.', 'error');
          return;
        }

        try {
          setBusy(true);
          showPwStatus('Updating password…', 'info');
          await auth.changePassword(currentPassword, newPassword);

          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';

          showPwStatus('Password updated.', 'success');
        } catch (err) {
          showPwStatus(err && err.message ? err.message : 'Failed to update password.', 'error');
        } finally {
          setBusy(false);
        }
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>INRL AR — Register (Client)</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="w-full max-w-lg bg-white rounded shadow p-6">
      <h1 class="text-2xl font-bold mb-4">INRL AR — Register (Client)</h1>

      <div id="alert" class="text-sm text-red-600 mb-3"></div>

      <div class="mb-4 text-sm text-gray-700">
        Register as a regular client to use the viewer. Brand users and administrators must use an invite link.
      </div>

      <label class="block text-sm">Email</label>
      <input id="email" type="email" class="w-full border rounded p-2 mb-3" placeholder="you@company.com" />

      <label class="block text-sm">Password</label>
      <input id="password" type="password" class="w-full border rounded p-2 mb-3" placeholder="Create a password" />

      <label class="block text-sm">Display name</label>
      <input id="displayName" type="text" class="w-full border rounded p-2 mb-3" placeholder="Your full name" />

      <div class="flex gap-2 mb-2">
        <button id="registerBtn" class="flex-1 bg-blue-600 text-white rounded p-2">Register</button>
        <a href="/login.html" class="flex-1 inline-flex items-center justify-center bg-gray-200 rounded p-2">Back to Login</a>
      </div>

      <p class="text-xs text-gray-500">
        This form is for regular client registration only. Brand users and administrators need an invitation link from an existing admin.
      </p>
    </div>

    <script>
      const alertEl = document.getElementById('alert');
      const registerBtn = document.getElementById('registerBtn');

      function setAlert(msg, isError = true) {
        alertEl.textContent = msg || '';
        alertEl.classList.toggle('text-red-600', !!isError);
        alertEl.classList.toggle('text-green-700', !isError);
      }

      async function doRegister() {
        try {
          registerBtn.disabled = true;
          registerBtn.textContent = 'Registering...';
          setAlert('');

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          const displayName = document.getElementById('displayName').value.trim();

          if (!email || !password) {
            setAlert('Email and password are required.');
            return;
          }

          const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password, displayName })
          });

          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data?.error || `Register failed (${res.status})`);

          setAlert('Account created. Redirecting...', false);
          // Client users typically go to the viewer; adjust if you prefer the shop.
          window.location.href = '/index.html';
        } catch (e) {
          setAlert(e?.message || String(e));
        } finally {
          registerBtn.disabled = false;
          registerBtn.textContent = 'Register';
        }
      }

      registerBtn.addEventListener('click', doRegister);
    </script>
  </body>
</html>

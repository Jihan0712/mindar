<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>INRL AR — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/auth-worker.js?v=20260130"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded shadow p-6">
  <h1 class="text-2xl font-bold mb-4">INRL AR — Sign in</h1>

      <div id="message" class="text-sm text-red-600 mb-2"></div>

      <label class="block text-sm">Email</label>
      <input id="email" type="email" class="w-full border rounded p-2 mb-3" />

      <label class="block text-sm">Password</label>
      <input id="password" type="password" class="w-full border rounded p-2 mb-4" />

      <div class="flex gap-2">
        <button id="signin" class="flex-1 bg-blue-600 text-white rounded p-2">Sign in</button>
        <button id="signup" class="flex-1 bg-gray-200 rounded p-2">Sign up</button>
      </div>

      <p class="text-xs text-gray-400 mt-4">After signing in you'll be redirected to the dashboard (admins and brand users share the same login).</p>
    </div>

    <script>
      const emailEl = document.getElementById('email');
      const passEl = document.getElementById('password');
      const signInBtn = document.getElementById('signin');
      const signUpBtn = document.getElementById('signup');
      const msg = document.getElementById('message');

      function showError(e) {
        console.error('Auth error:', e);
        const text = e?.message || String(e);
        msg.textContent = text;
        setTimeout(() => msg.textContent = '', 8000);
      }

      // If already signed in, optionally route by role.
      // Skip auto-redirect if `?force=1` or a `next` param is present (user may want to switch accounts).
      (async () => {
        const qs = new URLSearchParams(location.search);
        const force = qs.get('force');
        const hasNext = qs.has('next');
        const user = await auth.me();
        if (user && !hasNext && force !== '1') {
          auth.redirectByRole(user);
        }
      })();

      signInBtn.addEventListener('click', async () => {
        try {
          const email = emailEl.value.trim();
          const password = passEl.value;
          if (!email || !password) return showError('Enter email and password');
          await auth.login(email, password);
          const user = await auth.me();
          auth.redirectByRole(user);
        } catch (e) { showError(e); }
      });

      signUpBtn.addEventListener('click', () => {
        window.location.href = '/register.html';
      });

      // Optional: allow quick logout from the login page if already signed in
      // (useful when reaching login via bookmark and wanting to switch accounts)
      document.addEventListener('DOMContentLoaded', async () => {
        const user = await auth.me();
        if (user) {
          const toggle = document.createElement('div');
          toggle.className = 'mt-3 text-xs text-gray-600';
          toggle.innerHTML = `Signed in as <strong>${user.email || ''}</strong>. <button id="logoutFromLogin" class="underline">Logout</button>`;
          document.querySelector('.max-w-md')?.appendChild(toggle);
          document.getElementById('logoutFromLogin')?.addEventListener('click', async () => {
            await auth.logout();
            location.href = '/ecommerce/login.html?force=1';
          });
        }
      });
    </script>
  </body>
</html>

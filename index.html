<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>INRL AR Viewer (Stabilized)</title>

    <!-- A-Frame + MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      /* start-screen removed in favor of minimal, non-blocking sound toggle */

      /* Floating sound toggle (minimal, non-blocking) */
      .sound-toggle {
        position: fixed;
        right: 14px;
        bottom: 14px;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.92);
        box-shadow: 0 6px 18px rgba(2,6,23,0.15);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        z-index: 10002;
      }
      .sound-toggle.hidden { display: none; }

      /* (Removed) Orientation guard styles — viewer now works in landscape */
    </style>

    <!-- Supabase Client -->
    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://cxcbgrhqujgrrmkqcewv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_kdk75aMwV6efd8Fcs1AsoA_a905uRWO";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function loadActiveTarget() {
        console.log("📡 Loading active target from Worker API...");
        const params = new URLSearchParams(window.location.search);
        const brand = (params.get('brand') || '').trim();
        const product = (params.get('product') || '').trim();
        const qs = new URLSearchParams();
        if (brand) qs.set('brand', brand);
        if (product) qs.set('product', product);
        const res = await fetch(`/api/viewer/active${qs.toString() ? `?${qs}` : ''}`);
        if (!res.ok) {
          const msg = await res.text().catch(() => '');
          console.error("❌ No active target", res.status, msg);
          return null;
        }
        const row = await res.json();
        console.log("✅ Active target loaded:", row);
        return row; // has mindurl, videourl, imageurl
      }

      // debounce helper
      function debounce(fn, wait) {
        let t = null;
        return function(...args) {
          clearTimeout(t);
          t = setTimeout(() => fn.apply(this, args), wait);
        };
      }

      // When device orientation or window resizes, re-size scene and video plane only
      const handleOrientationOrResize = debounce(() => {
        try {
          // also trigger resize/refresh on aframe scene if available
          const sceneEl = document.querySelector('a-scene');
          if (sceneEl && sceneEl.resize) sceneEl.resize();
          if (typeof window.sizeInnerPlaneGlobal === 'function') {
            try { window.sizeInnerPlaneGlobal(); } catch(e) {}
          }
          setTimeout(() => { try { sceneEl && sceneEl.resize && sceneEl.resize(); } catch(e){} }, 200);
        } catch (e) {
          console.warn('orientation/resize handler error', e);
        }
      }, 250);

      function realignMindARAfterRotate() {
        try {
          const sceneEl = document.querySelector('a-scene');
          const arSystem = sceneEl?.systems?.['mindar-image-system'];
          try { arSystem?.onResize?.(); } catch(e) {}
          try { arSystem?.controller?.onResize?.(); } catch(e) {}
          // Optional fallback restart via query (?rotateRestart=1) to handle edge devices
          try {
            const p = new URLSearchParams(location.search);
            const shouldRestart = ['1','true','yes'].includes((p.get('rotateRestart')||'').toLowerCase());
            if (shouldRestart && arSystem && arSystem.stop && arSystem.start) {
              arSystem.stop();
              setTimeout(() => { try { arSystem.start(); } catch(e){} }, 60);
            }
          } catch (e) {}
        } catch (e) { console.warn('realignMindARAfterRotate error', e); }
      }

      window.addEventListener('orientationchange', () => {
        handleOrientationOrResize();
        // settle layout and realign MindAR without showing loading
        setTimeout(() => {
          try { handleOrientationOrResize(); } catch(e){}
          realignMindARAfterRotate();
          try { if (typeof window.sizeInnerPlaneGlobal === 'function') window.sizeInnerPlaneGlobal(); } catch(e){}
          // a couple of rAF ticks to smooth out relayout
          let ticks = 0; const sceneEl = document.querySelector('a-scene');
          const smooth = () => {
            try { sceneEl && sceneEl.resize && sceneEl.resize(); } catch(e){}
            if (ticks++ < 2) requestAnimationFrame(smooth);
          };
          requestAnimationFrame(smooth);
        }, 180);
      });
      window.addEventListener('resize', handleOrientationOrResize);
      try { if (window.visualViewport) visualViewport.addEventListener('resize', handleOrientationOrResize); } catch(e){}

      document.addEventListener("DOMContentLoaded", async () => {
        const tOverallStart = performance.now();
        const activeTarget = await loadActiveTarget();
        console.log(`timing: fetched active target in ${Math.round(performance.now()-tOverallStart)}ms`);
        if (!activeTarget) {
          console.warn('No active target found; continuing to show camera for scanning.');
          // show a small non-blocking notice rather than replacing the page
          const note = document.createElement('div');
          note.id = 'no-target-note';
          note.style.cssText = 'position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#fff;padding:8px 12px;border-radius:8px;z-index:10003;font-size:13px;';
          note.textContent = 'No active target configured — camera ready for scanning.';
          document.body.appendChild(note);
          setTimeout(() => { try { note.remove(); } catch(e){} }, 6000);
        }

        const mindUrl = activeTarget ? activeTarget.mindurl : null;
        const videoUrl = activeTarget ? activeTarget.videourl : null;
        // expose current active target for orientation/resize handlers
        window.currentActiveTarget = activeTarget;

        const scene = document.querySelector("a-scene");
        const aframeVideoAsset = document.querySelector("#card");
        const planeEl = document.querySelector("#video-plane");
        const target = document.querySelector("#target");
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        let lastTargetVisible = false;

        // Fit mode from query: contain | cover | stretch (default: contain)
        (function initFitMode() {
          try {
            const p = new URLSearchParams(window.location.search);
            const f = (p.get('fit') || 'contain').toLowerCase();
            const allowed = ['contain','cover','stretch'];
            window.inrlFitMode = allowed.includes(f) ? f : 'contain';
            console.log('[viewer] fit mode =', window.inrlFitMode);
          } catch (e) { window.inrlFitMode = 'contain'; }
        })();

        // --- Sound toggle and AudioContext unlock helper ---
        let audioCtx = null;
        const soundToggle = document.getElementById('soundToggle');
        let soundEnabled = localStorage.getItem('inrl_sound_enabled') === 'true';

        function updateSoundUI() {
          if (!soundToggle) return;
          soundToggle.textContent = soundEnabled ? '🔊' : '❌';
          soundToggle.setAttribute('aria-pressed', String(!!soundEnabled));
        }

        async function initAudioContextIfNeeded() {
          if (audioCtx) return audioCtx;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          return audioCtx;
        }

        async function unlockAudio() {
          try {
            const ctx = await initAudioContextIfNeeded();
            if (ctx.state === 'suspended') {
              await ctx.resume();
              // play silent buffer to ensure some browsers fully unlock
              const buf = ctx.createBuffer(1, 1, 22050);
              const src = ctx.createBufferSource();
              src.buffer = buf;
              src.connect(ctx.destination);
              src.start(0);
              src.stop(0);
            }
          } catch (err) {
            console.warn('unlockAudio failed', err);
          }
        }

        async function enableSound() {
          soundEnabled = true;
          localStorage.setItem('inrl_sound_enabled', 'true');
          updateSoundUI();
          await unlockAudio();
          try { aframeVideoAsset.muted = false; } catch(e){}
        }

        function disableSound() {
          soundEnabled = false;
          localStorage.setItem('inrl_sound_enabled', 'false');
          updateSoundUI();
          try { aframeVideoAsset.muted = true; } catch(e){}
        }

        // Toggle button handler
        soundToggle?.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          if (!soundEnabled) await enableSound(); else disableSound();
        });

        // First user interaction should always prime media playback on Safari/iOS
        const primePlaybackOnce = async () => {
          await unlockAudio().catch(()=>{});
          try {
            // Safari sometimes needs a play+pause gesture to allow future autoplay
            await aframeVideoAsset.play();
            aframeVideoAsset.pause();
          } catch (err) {
            console.warn('primePlaybackOnce play/ pause failed (expected on locked browsers):', err);
          }
          window.removeEventListener('touchend', primePlaybackOnce);
          window.removeEventListener('click', primePlaybackOnce);
        };
        window.addEventListener('touchend', primePlaybackOnce, { once: true });
        window.addEventListener('click', primePlaybackOnce, { once: true });

        // Initialize UI from stored preference
        if (soundEnabled) {
          // ensure audio unlocked when page loads if preference was enabled
          unlockAudio().catch(()=>{});
          try { aframeVideoAsset.muted = false; } catch(e){}
        }

        // Prefetch the .mind file to warm the browser cache - MindAR will still
        // request it, but this can reduce latency on initial load.
        (async () => {
          try {
            const t = performance.now();
            await fetch(mindUrl, { method: 'GET', mode: 'cors', cache: 'force-cache' });
            console.log(`timing: prefetched .mind in ${Math.round(performance.now()-t)}ms`);
          } catch (e) {
            console.warn('Could not prefetch .mind (non-fatal):', e);
          }
        })();

        // function to apply the active target to the scene (re-usable on rotate/resize)
        async function applyActiveTarget(target) {
          const mindUrlLocal = target ? target.mindurl : null;
          const videoUrlLocal = target ? target.videourl : null;
          if (mindUrlLocal && videoUrlLocal) {
            const mindarOpts = [
              `imageTargetSrc: ${mindUrlLocal}`,
              'autoStart: true',
              'filterMinCF: 0.0001',
              'filterBeta: 0.01',
              'warmupTolerance: 5',
              'missTolerance: 5',
              'uiScanning: false',
              'uiLoading: false'
            ];
            if (isIOS) { mindarOpts.push('maxTrack: 1'); }
            scene.setAttribute('mindar-image', mindarOpts.join('; '));
            try { aframeVideoAsset.setAttribute('crossorigin', 'anonymous'); } catch (e) {}
            // reassign source so browser refetches metadata if orientation changed
            if (aframeVideoAsset.src !== videoUrlLocal) aframeVideoAsset.src = videoUrlLocal;
            aframeVideoAsset.loop = true;
            aframeVideoAsset.muted = !(localStorage.getItem('inrl_sound_enabled') === 'true');
            aframeVideoAsset.playsInline = true;
            aframeVideoAsset.preload = 'auto';
            // after metadata loads, size inner plane
            aframeVideoAsset.addEventListener('loadedmetadata', () => {
              try { if (typeof sizeInnerPlaneGlobal === 'function') sizeInnerPlaneGlobal(); } catch(e){}
            }, { once: true });
          } else {
            try { aframeVideoAsset.removeAttribute('src'); } catch(e){}
            try { aframeVideoAsset.muted = true; } catch(e){}
          }
        }

        // expose for external use
        window.applyActiveTarget = applyActiveTarget;

        // initially apply
        applyActiveTarget(activeTarget).catch(()=>{});
        // ensure any late layout settles
        setTimeout(() => { try { if (typeof window.sizeInnerPlaneGlobal === 'function') window.sizeInnerPlaneGlobal(); } catch(e){} }, 300);

        // Wait until mesh is ready. More robust: listen for both 'loaded' (A-Frame primitive)
        // and 'model-loaded' events, and poll for a longer window before giving up.
        function whenPlaneMeshReady(cb) {
          try {
            const existingMesh = planeEl.getObject3D && planeEl.getObject3D("mesh");
            if (existingMesh) {
              console.log('whenPlaneMeshReady: mesh already present');
              return cb(existingMesh);
            }

            const onLoaded = () => {
              const m = planeEl.getObject3D && planeEl.getObject3D('mesh');
              if (m) {
                cleanup();
                return cb(m);
              }
            };

            const onModelLoaded = () => {
              const m = planeEl.getObject3D && planeEl.getObject3D('mesh');
              if (m) {
                cleanup();
                return cb(m);
              }
            };

            planeEl.addEventListener('loaded', onLoaded);
            planeEl.addEventListener('model-loaded', onModelLoaded);

            let tries = 0;
            const iv = setInterval(() => {
              const m = planeEl.getObject3D && planeEl.getObject3D('mesh');
              if (m) {
                cleanup();
                console.log('whenPlaneMeshReady: mesh found via polling');
                return cb(m);
              }
              tries++;
              if (tries > 100) { // ~10s
                console.warn('whenPlaneMeshReady: Could not find plane mesh after polling');
                cleanup();
              }
            }, 100);

            function cleanup() {
              planeEl.removeEventListener('loaded', onLoaded);
              planeEl.removeEventListener('model-loaded', onModelLoaded);
              clearInterval(iv);
            }
          } catch (err) {
            console.error('whenPlaneMeshReady error:', err);
          }
        }

        // Helper: infer target aspect ratio from stored marker image URL if available
        async function getTargetAspectFromImage(active) {
          const url = active?.imageurl;
          if (!url) return null;
          try {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            const p = new Promise((resolve, reject) => {
              img.onload = () => resolve(img);
              img.onerror = reject;
            });
            img.src = url;
            const loaded = await p;
            const w = loaded.naturalWidth || 0;
            const h = loaded.naturalHeight || 0;
            if (w > 0 && h > 0) return w / h; // width/height
          } catch (e) {
            console.warn('Could not infer target aspect from imageurl:', e);
          }
          return null;
        }

        // Decide whether borders are needed and which type (letterbox = top/bottom, pillarbox = left/right)
        function decideBorder(targetAspect, videoAspect, tol = 0.02) {
          const tAspect = targetAspect && Number.isFinite(targetAspect) && targetAspect > 0 ? targetAspect : 1;
          const vAspect = Number.isFinite(videoAspect) && videoAspect > 0 ? videoAspect : 1;
          if (Math.abs(tAspect - vAspect) <= tol) return { same: true, mode: 'none' };
          if (vAspect > tAspect) return { same: false, mode: 'letterbox' };
          return { same: false, mode: 'pillarbox' };
        }

        // Size the plane to match the marker's real aspect (width=1 unit, height=1/targetAspect)
        const targetAspect = await getTargetAspectFromImage(activeTarget) || 1;
        const planeWidthUnits = 1;
        const planeHeightUnits = 1 / targetAspect;

        whenPlaneMeshReady((mesh) => {
          // Make the main plane act as the black border (fills the marker)
          planeEl.setAttribute("width", planeWidthUnits);
          planeEl.setAttribute("height", planeHeightUnits);
          try { planeEl.setAttribute('material', 'shader: flat; color: #000;'); } catch(e) {}
          try { planeEl.removeAttribute('src'); } catch(e) {}

          // Create (or reuse) an inner video plane that will display the <video> element directly.
          let inner = target.querySelector('#video-inner-plane');
          if (!inner) {
            inner = document.createElement('a-plane');
            inner.setAttribute('id', 'video-inner-plane');
            inner.setAttribute('src', '#card');
            inner.setAttribute('position', '0 0 0.001');
            inner.setAttribute('rotation', '0 0 0');
            inner.setAttribute('material', 'shader: flat; transparent: false; color: #fff;');
            inner.setAttribute('visible', 'false');
            target.appendChild(inner);
          }

          // Size the inner plane to preserve the video's aspect ratio and fit inside the marker.
          function sizeInnerPlane() {
            const vw = aframeVideoAsset.videoWidth;
            const vh = aframeVideoAsset.videoHeight;
            if (!vw || !vh) return;
            const videoAspect = vw / vh;

            const markerW = planeWidthUnits;
            const markerH = planeHeightUnits;
            const markerAspect = markerW / markerH;
            let videoUnitW, videoUnitH;
            const mode = (window.inrlFitMode || 'contain');

            if (mode === 'stretch') {
              // Ignore aspect: fill marker completely
              videoUnitW = markerW;
              videoUnitH = markerH;
            } else if (mode === 'cover') {
              // Fill marker in both dimensions (may overflow one side)
              if (videoAspect > markerAspect) {
                // video wider than marker -> match height, overflow width
                videoUnitH = markerH;
                videoUnitW = markerH * videoAspect;
              } else {
                // video taller/narrower -> match width, overflow height
                videoUnitW = markerW;
                videoUnitH = markerW / videoAspect;
              }
            } else {
              // contain (default): fit entirely inside marker
              if (videoAspect > markerAspect) {
                videoUnitW = markerW;
                videoUnitH = markerW / videoAspect;
              } else {
                videoUnitH = markerH;
                videoUnitW = markerH * videoAspect;
              }
            }

            inner.setAttribute('width', videoUnitW);
            inner.setAttribute('height', videoUnitH);
            inner.setAttribute('visible', 'true');
            try { planeEl.setAttribute('visible', 'true'); } catch(e) {}
          }

          // expose re-sizer for orientation/resize handlers
          try { window.sizeInnerPlaneGlobal = sizeInnerPlane; } catch(e) {}

          // Wait for video metadata so we can read natural dimensions.
          if (aframeVideoAsset.readyState >= 1) sizeInnerPlane();
          else aframeVideoAsset.addEventListener('loadedmetadata', sizeInnerPlane, { once: true });
        });

        // start-screen removed; playback will attempt on targetFound and prompt if blocked

        // Stabilizer - smooth movement/rotation
        const SMOOTHING_FACTOR = 0.05;
        let lastPosition = new THREE.Vector3();
        let lastRotation = new THREE.Euler();

        scene.addEventListener("renderstart", () => {
          const obj = target.object3D;
          const tick = () => {
            lastPosition.lerp(obj.position, SMOOTHING_FACTOR);
            obj.position.copy(lastPosition);
            lastRotation.x += (obj.rotation.x - lastRotation.x) * SMOOTHING_FACTOR;
            lastRotation.y += (obj.rotation.y - lastRotation.y) * SMOOTHING_FACTOR;
            lastRotation.z += (obj.rotation.z - lastRotation.z) * SMOOTHING_FACTOR;
            obj.rotation.copy(lastRotation);
            requestAnimationFrame(tick);
          };
          tick();
        });

        target.addEventListener("targetFound", () => {
          console.log("🎯 Target found — play video");
          lastTargetVisible = true;
          aframeVideoAsset.play().catch((e) => {
            console.warn("play blocked (no user gesture):", e);
            const prompt = document.createElement('div');
            prompt.id = 'play-prompt';
            prompt.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:8px 12px;border-radius:8px;z-index:10001;cursor:pointer;';
            prompt.textContent = 'Tap to enable video playback';
            document.body.appendChild(prompt);
            prompt.addEventListener('click', async () => {
              await unlockAudio().catch(()=>{});
              try { aframeVideoAsset.muted = false; } catch(e){}
              aframeVideoAsset.play().catch(() => {});
              prompt.remove();
            }, { once: true });
          });
        });

        target.addEventListener("targetLost", () => {
          console.log("👀 Target lost — pause video");
          lastTargetVisible = false;
          aframeVideoAsset.pause();
        });

        document.addEventListener('visibilitychange', () => {
          if (document.hidden) {
            aframeVideoAsset.pause();
          } else if (lastTargetVisible) {
            aframeVideoAsset.play().catch(()=>{});
          }
        });
      });
    </script>
  </head>

  <body>

      <!-- Minimal floating sound toggle -->
      <button id="soundToggle" class="sound-toggle" aria-pressed="false" aria-label="Enable sound">🔈</button>

      <!-- Orientation guard removed: viewer supported in landscape -->

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="card" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-plane
          id="video-plane"
          position="0 0 0"
          width="1"
          height="1"
          rotation="0 0 0"
          material="shader: flat; transparent: false; color: #fff;">
        </a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <meta http-equiv="refresh" content="0; url=/ecommerce/profile.html" />
  </head>
  <body>
    <script>
      (function(){
        const next = (location.pathname || '') + (location.search || '') + (location.hash || '');
        const url = new URL('/ecommerce/profile.html', location.origin);
        if (next && next !== '/profile.html') url.searchParams.set('from', next);
        location.replace(url.toString());
      })();
    </script>
  </body>
</html>
